# ---------------------------------------------------------------------------
# Jenkins controller for the ERS repos — runs BESIDE the app stack, never inside it.
# The app's docker-compose.yml (repo root) neither knows nor cares this exists.
#
#   start:   docker compose up -d --build    (from this directory)
#   UI:      http://localhost:8090           (host 8080 belongs to the ERS gateway)
#   unlock:  docker compose exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
#   stop:    docker compose down             (state survives in the jenkins_home volume)
#   nuke:    docker compose down -v          (removes ALL Jenkins state)
# ---------------------------------------------------------------------------
services:
  jenkins:
    # Custom image = stock LTS + the docker CLI (see Dockerfile) so pipelines can run
    # their stages in disposable containers through the mounted socket below.
    build: .
    image: ers-jenkins:lts-jdk21
    container_name: ers-jenkins
    ports:
      # 127.0.0.1 bind on purpose: the UI is reachable ONLY from this machine — not the LAN,
      # not the internet. Combined with pull-based SCM polling (no inbound webhooks), Jenkins
      # needs zero exposure to exist: it only ever dials OUT (GitHub, Discord).
      - "127.0.0.1:8090:8080"
    # The jenkins user must be in the host's docker group to use the socket. 985 is this
    # host's docker GID — check yours with:  getent group docker | cut -d: -f3
    group_add:
      - "985"
    volumes:
      - jenkins_home:/var/jenkins_home
      # The host Docker socket — how `agent { docker { ... } }` stages run. Plain-words
      # caveat: socket access is root-equivalent ON THIS HOST, which is why the UI is
      # loopback-only and admin credentials matter even "just locally".
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:
