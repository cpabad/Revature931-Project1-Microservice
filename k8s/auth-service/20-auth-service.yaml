# ---------------------------------------------------------------------------
# auth-service — the stateless half of the template.
# The split that matters: NON-secret config -> ConfigMap, secrets -> Secret. Both are surfaced to
# the container with envFrom, so the app reads them as ordinary environment variables (the same
# AUTH_DB_URL / ERS_JWT_SECRET it uses in docker-compose and local dev).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: ers
data:
  # in-cluster DNS: "auth-db" is the Service in 10-postgres.yaml
  AUTH_DB_URL: jdbc:postgresql://auth-db:5432/ers_auth
  AUTH_DB_USER: ers
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: ers
type: Opaque
stringData:
  AUTH_DB_PASSWORD: ers
  # HS256 needs >=32 chars. reimbursement-service would carry the SAME value to verify tokens.
  ERS_JWT_SECRET: dev-only-insecure-ers-jwt-secret-change-me-32+
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          # CHANGEME once GitLab is set up: registry.gitlab.com/<your-namespace>/ers/auth-service:latest
          # For a local K3s test with no registry, build the image, import it into K3s's containerd
          #   (`docker save ... | sudo k3s ctr images import -`), and set the tag below to match.
          image: registry.gitlab.com/CHANGEME/ers/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          # TCP probes because the app has no health endpoint yet. Adding
          # spring-boot-starter-actuator would let these become httpGet /actuator/health,
          # which also distinguishes "started" (liveness) from "DB-connected" (readiness).
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ers
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
