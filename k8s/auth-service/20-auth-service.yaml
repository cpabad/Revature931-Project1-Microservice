# ---------------------------------------------------------------------------
# auth-service — the stateless half of the template.
# The split that matters: NON-secret config -> ConfigMap, secrets -> Secret. Both are surfaced to
# the container with envFrom, so the app reads them as ordinary environment variables (the same
# AUTH_DB_URL / AUTH_DB_PASSWORD it uses in docker-compose and local dev).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: ers
data:
  # in-cluster DNS: "auth-db" is the Service in 10-postgres.yaml
  AUTH_DB_URL: jdbc:postgresql://auth-db:5432/ers_auth
  AUTH_DB_USER: ers
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: ers
type: Opaque
stringData:
  AUTH_DB_PASSWORD: ers
  # No JWT secret here: auth-service signs RS256 with an EPHEMERAL RSA keypair generated at startup
  # (see JwkConfig) and publishes the public half at /.well-known/jwks.json. There is no signing
  # secret to configure, share, or leak — verifiers fetch the key, they never hold one.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # Pull the private image from the GitLab Container Registry. The secret is created out-of-band
      # (never in a tracked file): kubectl create secret docker-registry gitlab-registry -n ers ...
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: auth-service
          # Private image in the GitLab Container Registry (project ca132731/Revature931-Project1-
          # Microservice); K3s pulls it via the gitlab-registry imagePullSecret above. Registryless
          # local alternative: build, then `docker save ... | sudo k3s ctr images import -` + match tag.
          image: registry.gitlab.com/ca132731/revature931-project1-microservice/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          # TCP probes because the app has no health endpoint yet. Adding
          # spring-boot-starter-actuator would let these become httpGet /actuator/health,
          # which also distinguishes "started" (liveness) from "DB-connected" (readiness).
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ers
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
