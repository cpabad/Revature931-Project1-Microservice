# ---------------------------------------------------------------------------
# auth-service — the stateless half of the template.
# The split that matters: NON-secret config -> ConfigMap, secrets -> Secret. Both are surfaced to
# the container with envFrom, so the app reads them as ordinary environment variables (the same
# AUTH_DB_URL / AUTH_DB_PASSWORD it uses in docker-compose and local dev).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: ers
data:
  # in-cluster DNS: "auth-db" is the Service in 10-postgres.yaml
  AUTH_DB_URL: jdbc:postgresql://auth-db:5432/ers_auth
  AUTH_DB_USER: ers
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: ers
type: Opaque
stringData:
  AUTH_DB_PASSWORD: ers
  # No JWT secret here: auth-service signs RS256 with an EPHEMERAL RSA keypair generated at startup
  # (see JwkConfig) and publishes the public half at /.well-known/jwks.json. There is no signing
  # secret to configure, share, or leak — verifiers fetch the key, they never hold one.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # Pull the private image from the GitLab Container Registry. The secret is created out-of-band
      # (never in a tracked file): kubectl create secret docker-registry gitlab-registry -n ers ...
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: auth-service
          # Private image in the GitLab Container Registry (project ca132731/Revature931-Project1-
          # Microservice); K3s pulls it via the gitlab-registry imagePullSecret above. Registryless
          # local alternative: build, then `docker save ... | sudo k3s ctr images import -` + match tag.
          image: registry.gitlab.com/ca132731/revature931-project1-microservice/auth-service:latest
          # Always, because the tag is mutable (:latest): IfNotPresent would keep serving the
          # node's cached build forever after a re-push. Cheap when unchanged (digest check).
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          env:
            # Points JwkConfig at the mounted signing key below. With this set, every replica
            # loads the SAME RS256 pair (kid = key thumbprint) and restarts keep outstanding
            # tokens valid; an unloadable path fails the boot rather than silently downgrading
            # to per-replica ephemeral keys.
            - name: ERS_JWT_PRIVATE_KEY_PEM
              value: /etc/ers/keys/jwt-signing.pem
          volumeMounts:
            - name: jwt-signing-key
              mountPath: /etc/ers/keys
              readOnly: true
          # TCP probes because the app has no health endpoint yet. Adding
          # spring-boot-starter-actuator would let these become httpGet /actuator/health,
          # which also distinguishes "started" (liveness) from "DB-connected" (readiness).
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 512Mi
      volumes:
        # The RS256 signing key - a PKCS#8 PEM in a Secret created OUT-OF-BAND like the
        # gitlab-registry pull secret (a private signing key never belongs in git):
        #   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out jwt-signing.pem
        #   kubectl -n ers create secret generic auth-jwt-key --from-file=jwt-signing.pem
        # Deliberately NOT optional: the pod waits (ContainerCreating) until the secret exists,
        # a visible signal, instead of booting with a key that no other replica shares.
        - name: jwt-signing-key
          secret:
            secretName: auth-jwt-key
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ers
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
