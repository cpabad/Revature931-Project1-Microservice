spring.application.name=ers-soap-adapter

# Fixed port so the gateway route (application.yml in the gateway module) can find us.
server.port=8083

# --- Kafka (producer side) ------------------------------------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Don't stamp producer-side CLASS NAMES into headers: the consumer owns its own event class,
# so the JSON body is the whole contract (type headers would leak this module's package names).
spring.kafka.producer.properties.spring.json.add.type.headers=false

# The SOAP ack BLOCKS on the send result (an honest ack), so a dead broker must fail fast,
# not hang the partner's synchronous call on the client defaults (max.block.ms 60s while
# fetching metadata, delivery.timeout.ms 120s of retries).
# acks=all: the leader waits for all in-sync replicas before acking - "accepted" means the
# event survives a broker failure. (The Kafka 3.x default via enable.idempotence, pinned
# here because the endpoint's honesty depends on it.)
spring.kafka.producer.acks=all
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.producer.properties.request.timeout.ms=5000
# must be >= request.timeout.ms + linger.ms; total retry budget before the future fails
spring.kafka.producer.properties.delivery.timeout.ms=10000

# The topic both sides agree on; the consumer config in reimbursement-service names the same one.
ers.kafka.topic.request-submitted=reimbursement.request.submitted
