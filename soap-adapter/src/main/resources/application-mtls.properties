# ============================================================================
# The 'mtls' profile: the adapter's PARTNER-FACING deployment mode.
# Run: SPRING_PROFILES_ACTIVE=mtls java -jar ... (after scripts/gen-partner-certs.sh)
#
# What each line buys, in handshake order:
#  - key-store            the SERVER's identity: Tomcat presents this cert (CN=localhost +
#                         SANs) so the partner can verify who IT is talking to - the
#                         ordinary half of TLS that every https:// connection does.
#  - client-auth=need     the mutual half: Tomcat sends a CertificateRequest during the
#                         handshake and ABORTS the connection if the client cannot answer
#                         with a certificate that chains to the trust-store below. "need"
#                         (vs "want") makes the cert mandatory, not optional.
#  - trust-store          contains ONLY our CA cert. This is the entire partner registry
#                         at the transport layer: a partner is whoever holds a private key
#                         whose certificate our CA signed. Onboarding = issuing a cert;
#                         offboarding = (production) revocation / short-lived certs.
#
# Authentication therefore finishes BEFORE any SOAP is parsed. The application layer only
# reads the verified CN (PartnerResolver) and applies authorization (the allowlist below).
# ============================================================================
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=${ERS_TLS_KEYSTORE:../certs/server-keystore.p12}
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${ERS_TLS_KEYSTORE_PASSWORD:changeit}
server.ssl.client-auth=need
server.ssl.trust-store=${ERS_TLS_TRUSTSTORE:../certs/partner-truststore.p12}
server.ssl.trust-store-type=PKCS12
server.ssl.trust-store-password=${ERS_TLS_TRUSTSTORE_PASSWORD:changeit}

# --- Authorization: which user ids each authenticated partner may submit FOR -------------
# Keys are certificate CNs. An authenticated partner with no entry may submit for NOBODY
# (globex below: valid cert, zero permissions - authentication is not authorization).
ers.partners.allowed-user-ids.acme=3,5
ers.partners.allowed-user-ids.globex=
