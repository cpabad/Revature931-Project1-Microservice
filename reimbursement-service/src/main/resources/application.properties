spring.application.name=ers-reimbursement-service

# Fixed port so the gateway route (application.yml in the gateway module) can find us.
server.port=8082

# --- Datasource: this service's OWN database -----------------------------------
# Databases-per-service: ers_reimbursement holds the domain tables plus a replicated,
# password-less reference copy of users/roles (owner: auth-service). Seeded by
# db/reimbursement/init.sql; no cross-database joins exist anywhere.
spring.datasource.url=${REIMB_DB_URL:jdbc:postgresql://localhost:5432/ers_reimbursement}
spring.datasource.username=${REIMB_DB_USER:ers}
spring.datasource.password=${REIMB_DB_PASSWORD:ers}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ----------------------------------------------------------
# Dialect is auto-detected from the live connection in Hibernate 6 - no need to set it.
# validate = compare entities to the existing schema, never modify it (safe; matches
# the monolith's hbm2ddl=validate).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# REST service: don't keep the JPA session open through view rendering (the
# Open-Session-In-View anti-pattern). The service layer owns the transaction boundary.
spring.jpa.open-in-view=false

# The existing schema was created by PLAIN Hibernate (identifiers used as-is). Spring Boot
# overrides that with CamelCaseToUnderscores (snake_case), which looks for the wrong names
# (e.g. schema "expense_reimbursement_management_system"). Switch back to the as-is strategy
# so our explicit column names + quoted mixed-case schema match the real DB. Applies to
# every entity in the migration.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- JWT verification (RS256, pure resource server) ----------------------------
# auth-service signs with its PRIVATE key; we fetch its PUBLIC key set from the JWKS
# endpoint below and can verify but never mint - verification rights no longer imply
# minting rights (the flaw of the old shared HS256 secret). Fetched lazily on the first
# bearer request, then cached; env-driven so compose/K8s can point at the service name.
ers.jwt.jwks-uri=${ERS_JWKS_URI:http://localhost:8081/.well-known/jwks.json}
# (ttl is an ISSUER concern - only auth-service mints; this service just validates.)

# --- JPA fetch discipline ---------------------------------------------------------
# Open-Session-In-View (Boot's default: ON) keeps the Hibernate session open through JSON
# serialization, so touching an unfetched LAZY association in a response "works" - as a
# hidden query per touch, from the web thread. With associations LAZY and DTOs mapped at
# the controller, that safety net would only hide fetch-plan mistakes as silent N+1;
# OFF makes a missed @EntityGraph path fail fast (LazyInitializationException) instead.
spring.jpa.open-in-view=false

# --- Pagination -----------------------------------------------------------------
# GET /requests is paged. This is the HARD cap: any ?size= larger than 100 is clamped to
# 100, so a client can never demand the whole table (the OOM risk the unbounded findAll had).
# default-page-size backstops requests that omit ?size= at a route without @PageableDefault.
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# --- Kafka (consumer side) ------------------------------------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.consumer.group-id=ers-reimbursement
# read the topic from the beginning if this group has no committed offset yet
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# ErrorHandlingDeserializer wraps the real JSON deserializer: malformed payloads become a
# DeserializationException the DefaultErrorHandler can route to the DLT (see KafkaConfig).
# A bare JsonDeserializer would throw INSIDE the poll loop - before the listener - and the
# container would re-poll the same broken record forever.
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
# Deserialize into OUR event class by JSON field names, ignoring any producer type headers -
# the producer (ers-soap-adapter) owns its own copy of the record; the JSON is the contract.
spring.kafka.consumer.properties.spring.json.value.default.type=com.revature.ers.event.RequestSubmissionEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.revature.ers.event

# The topic the SOAP adapter publishes to (its config names the same one).
ers.kafka.topic.request-submitted=reimbursement.request.submitted
