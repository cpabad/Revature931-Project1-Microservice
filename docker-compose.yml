# The whole system, one command: `docker compose up --build`
#
#   gateway (:8080 published)  ->  auth-service (:8081, internal)          -> auth-db
#                              ->  reimbursement-service (:8082, internal) -> reimbursement-db
#
# Databases-per-service made literal: two postgres containers, each seeded by its
# service's own init script (the same scripts local dev uses). Only the gateway is
# published to the host - the services and databases stay on the compose network.
#
# If host port 8080 is taken (e.g. the monolith's Tomcat): GATEWAY_PORT=9080 docker compose up

services:
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ers_auth
      POSTGRES_USER: ers
      POSTGRES_PASSWORD: ers
    volumes:
      # postgres runs every script in this directory on FIRST start of an empty data dir
      - ./db/auth:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ers -d ers_auth"]
      interval: 5s
      timeout: 3s
      retries: 12

  reimbursement-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ers_reimbursement
      POSTGRES_USER: ers
      POSTGRES_PASSWORD: ers
    volumes:
      - ./db/reimbursement:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ers -d ers_reimbursement"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Single-node Kafka in KRaft mode (no ZooKeeper). Carries the SOAP adapter's submission
  # events to reimbursement-service; internal-only like the databases.
  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 12

  auth-service:
    build:
      context: .
      args:
        MODULE: auth-service
    environment:
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/ers_auth
      AUTH_DB_USER: ers
      AUTH_DB_PASSWORD: ers
      # RS256: the signing keypair is generated inside this container at startup (JwkConfig);
      # there is no signing secret to inject. Verifiers fetch the public key via JWKS.
      # Publishes auth.user.updated after profile commits (replica sync, see UserUpdatedPublisher).
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  reimbursement-service:
    build:
      context: .
      args:
        MODULE: reimbursement-service
    environment:
      REIMB_DB_URL: jdbc:postgresql://reimbursement-db:5432/ers_reimbursement
      REIMB_DB_USER: ers
      REIMB_DB_PASSWORD: ers
      KAFKA_BOOTSTRAP: kafka:9092
      # Verify-only: fetch auth-service's public key set over the compose network.
      ERS_JWKS_URI: http://auth-service:8081/.well-known/jwks.json
    depends_on:
      reimbursement-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  soap-adapter:
    build:
      context: .
      args:
        MODULE: soap-adapter
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  gateway:
    build:
      context: .
      args:
        MODULE: gateway
    environment:
      # service names resolve on the compose network - no localhost inside containers
      AUTH_SERVICE_URL: http://auth-service:8081
      REIMB_SERVICE_URL: http://reimbursement-service:8082
      SOAP_SERVICE_URL: http://soap-adapter:8083
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - auth-service
      - reimbursement-service
      - soap-adapter
