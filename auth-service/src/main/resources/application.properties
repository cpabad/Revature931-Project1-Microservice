spring.application.name=ers-auth-service

# Fixed port so the gateway route (application.yml in the gateway module) can find us.
server.port=8081

# --- Datasource ---------------------------------------------------------------
# Same PostgreSQL and env vars as always (dburl / dbuser / dbpassword). This service OWNS
# users/roles; reimbursement-service maps them read-only (shared-DB boundary, documented there).
spring.datasource.url=${dburl}
spring.datasource.username=${dbuser}
spring.datasource.password=${dbpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# As-is naming strategy: the schema was created by plain Hibernate; see the entity mappings.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- JWT (this service is the ISSUER) ------------------------------------------
# The one place tokens are minted. The SAME secret is configured in reimbursement-service,
# which validates what we sign (HS256 is symmetric). Production MUST set ERS_JWT_SECRET.
ers.jwt.secret=${ERS_JWT_SECRET:dev-only-insecure-ers-jwt-secret-change-me-32+}
ers.jwt.ttl-seconds=${ERS_JWT_TTL_SECONDS:3600}
