spring.application.name=ers-auth-service

# Fixed port so the gateway route (application.yml in the gateway module) can find us.
server.port=8081

# --- Datasource: this service's OWN database -----------------------------------
# Databases-per-service: ers_auth holds ONLY users/roles (seeded by db/auth/init.sql), and
# this service is their only writer anywhere in the system. reimbursement-service keeps a
# replicated, password-less reference copy in ITS database - no cross-database joins exist.
spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5432/ers_auth}
spring.datasource.username=${AUTH_DB_USER:ers}
spring.datasource.password=${AUTH_DB_PASSWORD:ers}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# As-is naming strategy: the schema was created by plain Hibernate; see the entity mappings.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- JWT (this service is the ISSUER) ------------------------------------------
# The one place tokens are minted. Signing is RS256 with an EPHEMERAL RSA keypair generated
# at startup (see JwkConfig) - there is no signing secret to configure, share, or leak.
# Verifiers fetch the public key from GET /.well-known/jwks.json. A restart rotates the pair
# and invalidates outstanding tokens (fine at this TTL; production loads a persistent pair).
ers.jwt.ttl-seconds=${ERS_JWT_TTL_SECONDS:3600}

# --- Kafka (producer side) ------------------------------------------------------
# This service OWNS users/roles; every committed profile update is announced on
# auth.user.updated so replica holders (reimbursement-service) can converge - event-carried
# state transfer, published at AFTER_COMMIT (see UserUpdatedPublisher). Same bounded producer
# timeouts as the soap-adapter: a dead broker fails the send in seconds, never hangs a thread.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# the JSON body is the contract; no producer type headers (consumers own their event record)
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.acks=all
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.producer.properties.request.timeout.ms=5000
spring.kafka.producer.properties.delivery.timeout.ms=10000

ers.kafka.topic.user-updated=auth.user.updated
