spring.application.name=ers-auth-service

# Fixed port so the gateway route (application.yml in the gateway module) can find us.
server.port=8081

# --- Datasource: this service's OWN database -----------------------------------
# Databases-per-service: ers_auth holds ONLY users/roles (seeded by db/auth/init.sql), and
# this service is their only writer anywhere in the system. reimbursement-service keeps a
# replicated, password-less reference copy in ITS database - no cross-database joins exist.
spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5432/ers_auth}
spring.datasource.username=${AUTH_DB_USER:ers}
spring.datasource.password=${AUTH_DB_PASSWORD:ers}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# As-is naming strategy: the schema was created by plain Hibernate; see the entity mappings.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- JWT (this service is the ISSUER) ------------------------------------------
# The one place tokens are minted. Signing is RS256 (see JwkConfig); verifiers fetch the
# public key from GET /.well-known/jwks.json. Two key modes:
#  - private-key-pem UNSET (this default): an EPHEMERAL pair is generated at startup - nothing
#    to configure, share, or leak, but single-replica only, and a restart invalidates
#    outstanding tokens (fine at this TTL on a dev box).
#  - private-key-pem SET to a PKCS#8 PEM path (k8s: a mounted Secret created out-of-band):
#    every replica loads the SAME pair, restarts keep tokens valid. An unloadable path fails
#    the boot - no silent downgrade to per-replica keys.
ers.jwt.ttl-seconds=${ERS_JWT_TTL_SECONDS:3600}
ers.jwt.private-key-pem=${ERS_JWT_PRIVATE_KEY_PEM:}

# --- Kafka (producer side) ------------------------------------------------------
# This service OWNS users/roles; every committed profile update is announced on
# auth.user.updated so replica holders (reimbursement-service) can converge - event-carried
# state transfer via a TRANSACTIONAL OUTBOX: the event is written to outbox_event in the same
# DB transaction as the profile change (OutboxWriter), and the OutboxRelay drains it to Kafka
# (1s poll + after-commit nudge), deleting each row on the broker's ack. Values are the
# outbox's pre-serialized wire JSON, hence StringSerializer. Same bounded producer timeouts
# as the soap-adapter: a dead broker fails the send in seconds, never hangs a thread.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.producer.properties.request.timeout.ms=5000
spring.kafka.producer.properties.delivery.timeout.ms=10000

ers.kafka.topic.user-updated=auth.user.updated
