spring.application.name=ers-service

# --- Datasource ---------------------------------------------------------------
# Reuse the same PostgreSQL and the same environment variables the monolith used
# (dburl / dbuser / dbpassword), so the existing seeded DB works unchanged.
spring.datasource.url=${dburl}
spring.datasource.username=${dbuser}
spring.datasource.password=${dbpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ----------------------------------------------------------
# Dialect is auto-detected from the live connection in Hibernate 6 - no need to set it.
# validate = compare entities to the existing schema, never modify it (safe; matches
# the monolith's hbm2ddl=validate).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# REST service: don't keep the JPA session open through view rendering (the
# Open-Session-In-View anti-pattern). The service layer owns the transaction boundary.
spring.jpa.open-in-view=false

# The existing schema was created by PLAIN Hibernate (identifiers used as-is). Spring Boot
# overrides that with CamelCaseToUnderscores (snake_case), which looks for the wrong names
# (e.g. schema "expense_reimbursement_management_system"). Switch back to the as-is strategy
# so our explicit column names + quoted mixed-case schema match the real DB. Applies to
# every entity in the migration.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- JWT (self-issued) --------------------------------------------------------
# Symmetric HMAC signing (HS256): the SAME secret both mints (JwtEncoder) and validates
# (JwtDecoder) the token - this service is its own issuer, so one shared key is correct.
# HS256 requires a key of at least 256 bits / 32 bytes, or Nimbus throws at startup.
# Env-driven: a committed secret would let anyone forge tokens, so production MUST set
# ERS_JWT_SECRET. The default below is a dev-only placeholder (note it is >=32 chars).
ers.jwt.secret=${ERS_JWT_SECRET:dev-only-insecure-ers-jwt-secret-change-me-32+}
# Token lifetime in seconds (default 1 hour). Used by the JwtEncoder when minting.
ers.jwt.ttl-seconds=${ERS_JWT_TTL_SECONDS:3600}
