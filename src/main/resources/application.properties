spring.application.name=ers-service

# --- Datasource ---------------------------------------------------------------
# Reuse the same PostgreSQL and the same environment variables the monolith used
# (dburl / dbuser / dbpassword), so the existing seeded DB works unchanged.
spring.datasource.url=${dburl}
spring.datasource.username=${dbuser}
spring.datasource.password=${dbpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ----------------------------------------------------------
# Dialect is auto-detected from the live connection in Hibernate 6 - no need to set it.
# validate = compare entities to the existing schema, never modify it (safe; matches
# the monolith's hbm2ddl=validate). With no entities mapped yet this is a no-op.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# REST service: don't keep the JPA session open through view rendering (the
# Open-Session-In-View anti-pattern). The service layer owns the transaction boundary.
spring.jpa.open-in-view=false
